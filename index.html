<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Benny Jump</title>
    <style>
        :root { --bg: #000; --p1: #0ff; --p2: #f0f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #111; color: #fff; font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            overflow: hidden; display: flex; justify-content: center;
        }

        #master-wrapper {
            width: 100%; max-width: 450px; height: 100%; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid #222; border-right: 1px solid #222;
        }

        #ui-layer {
            height: 10%; width: 100%; display: flex; justify-content: space-between;
            align-items: center; padding: 0 20px; border-bottom: 2px solid #333;
            background: #0a0a0a; z-index: 10;
        }

        #game-area { flex-grow: 1; width: 100%; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        #controls {
            height: 18%; width: 100%; background: #050505;
            display: grid; grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px; padding: 12px; border-top: 2px solid #333;
        }
        .btn {
            background: #151515; border: 2px solid #444; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: bold; border-radius: 8px; cursor: pointer;
            user-select: none; touch-action: none;
        }
        .btn:active { background: #fff; color: #000; }
        .jump-btn { color: var(--p2); border-color: var(--p2); font-size: 1.2rem; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .restart-btn {
            margin-top:20px; padding: 15px 40px; border: 2px solid var(--p1); 
            background:none; color:var(--p1); font-weight:bold; cursor:pointer;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="master-wrapper">
    <div id="ui-layer">
        <span id="lvl-txt" style="color:var(--p1)">LVL: 1</span>
        <span id="score-txt">BLOCKS: 0/10</span>
    </div>

    <main id="game-area">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 style="color:red; font-size: 3rem; text-align:center; text-shadow: 0 0 15px red;">GAME OVER</h1>
            <button class="restart-btn" onclick="resetGame()">RESTART</button>
        </div>
    </main>

    <footer id="controls">
        <div class="btn" id="btn-left">LEFT</div>
        <div class="btn jump-btn" id="btn-up">JUMP</div>
        <div class="btn" id="btn-right">RIGHT</div>
    </footer>
</div>

<script>
let audioCtx;
function playFX(freq, type, vol, dur) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + dur);
    } catch(e) {}
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let level = 1, blocks = 0, isGameOver = false, animationId, hue = 0;
let player = { x: 0, y: 0, vx: 0, vy: 0, w: 30, h: 50, facing: 1, step: 0, grounded: false, lastVy: 0 };
let platforms = [], keys = {};
const RAINBOW = ['#ff0044', '#00ffcc', '#ffff00', '#ff00ff', '#0099ff', '#ff6600', '#ffffff'];

function init() {
    cancelAnimationFrame(animationId);
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    isGameOver = false; level = 1; blocks = 0; updateUI();
    player.x = canvas.width / 2 - 15; player.y = 150;
    player.vx = 0; player.vy = 0; player.grounded = false;
    platforms = [{ x: canvas.width / 2 - 40, y: 250, w: 80, h: 20, passed: true, color: '#0ff' }];
    for(let i=1; i<7; i++) {
        platforms.push({ x: Math.random() * (canvas.width - 80), y: 250 + (i * 130), w: 80, h: 20, passed: false, color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)] });
    }
    playFX(880, 'sine', 0.2, 0.4);
    gameLoop();
}

function drawAnatomicalLimb(ctx, x, y, angle, l1, l2, facing, sideOffset, thick, isBack) {
    ctx.lineWidth = thick;
    ctx.globalAlpha = isBack ? 0.5 : 1.0;
    let jX = x + Math.sin(angle) * l1 * facing;
    let jY = y + Math.cos(angle) * l1;
    let lowerAngle = angle * 0.5;
    let eX = jX + Math.sin(lowerAngle) * l2 * facing;
    let eY = jY + Math.cos(lowerAngle) * l2;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(jX, jY);
    ctx.lineTo(eX, eY);
    ctx.stroke();
    ctx.globalAlpha = 1.0;
}

function drawStickman(p) {
    ctx.save();
    let squash = (p.grounded && p.lastVy > 4) ? Math.min(p.lastVy * 0.5, 6) : 0;
    ctx.translate(p.x + 15, p.y + 25 + squash);
    
    const moving = Math.abs(p.vx) > 0.1;
    
    // Rainbow animation: shift hue constantly, shift faster when jumping
    hue = (hue + (p.grounded ? 2 : 10)) % 360;
    const col = `hsl(${hue}, 100%, 70%)`;
    
    ctx.strokeStyle = col; ctx.fillStyle = col;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowBlur = 15; ctx.shadowColor = col;

    let armAng, legAng;
    let walk = Math.sin(p.step);

    if (!p.grounded) {
        armAng = -1.2; 
        legAng = p.vy < 0 ? 0.8 : 0.2; 
    } else if (moving) {
        armAng = walk * 1.0;
        legAng = walk * 0.8;
    } else {
        armAng = 0.2;
        legAng = 0.15;
    }

    ctx.beginPath(); ctx.arc(0, -21, 7, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 7); ctx.stroke();
    drawAnatomicalLimb(ctx, 0, -11, -armAng, 9, 8, p.facing, -1, 3, true); 
    drawAnatomicalLimb(ctx, 0, -11, armAng, 9, 8, p.facing, 1, 3, false);
    drawAnatomicalLimb(ctx, -2 * p.facing, 7, -legAng - 0.1, 11, 11, p.facing, -1, 4, true); 
    drawAnatomicalLimb(ctx, 2 * p.facing, 7, legAng + 0.1, 11, 11, p.facing, 1, 4, false); 

    ctx.restore();
}

function draw3DPlatform(pl) {
    ctx.save();
    const depth = 8;
    ctx.shadowBlur = 15;
    ctx.shadowColor = pl.color;
    
    // Side/Bottom 3D "Depth"
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(pl.x + 4, pl.y + depth, pl.w, pl.h);
    
    // Main Brick Face
    ctx.strokeStyle = pl.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(pl.x, pl.y, pl.w, pl.h);
    
    // Brick Details (Vertical lines for segments)
    ctx.beginPath();
    ctx.moveTo(pl.x + pl.w/3, pl.y); ctx.lineTo(pl.x + pl.w/3, pl.y + pl.h);
    ctx.moveTo(pl.x + (pl.w/3)*2, pl.y); ctx.lineTo(pl.x + (pl.w/3)*2, pl.y + pl.h);
    ctx.stroke();
    
    // Inner Highlight for Neon Look
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.strokeRect(pl.x + 2, pl.y + 2, pl.w - 4, pl.h - 4);

    ctx.restore();
}

function gameLoop() {
    if (isGameOver) return;
    let scroll = 0.8 + (level * 0.4);
    platforms.forEach(pl => pl.y -= scroll);
    player.y -= scroll;
    const speed = 1.0 + (level * 0.1);
    let moving = false;
    if (keys['ArrowLeft'] || keys['LeftBtn']) { player.vx -= speed; player.facing = -1; player.step += 0.2; moving = true; }
    else if (keys['ArrowRight'] || keys['RightBtn']) { player.vx += speed; player.facing = 1; player.step += 0.2; moving = true; }
    else { player.vx *= 0.85; player.step *= 0.8; }
    if (moving && player.grounded && Math.floor(player.step * 10) % 15 === 0) playFX(120, 'triangle', 0.03, 0.05);
    if ((keys['ArrowUp'] || keys['UpBtn']) && player.grounded) { player.vy = -14; player.grounded = false; playFX(500, 'square', 0.15, 0.1); }
    player.vy += 0.6; player.x += player.vx; player.y += player.vy;
    if (player.x > canvas.width) player.x = -20; if (player.x < -20) player.x = canvas.width;
    let wasGrounded = player.grounded; player.grounded = false;
    platforms.forEach(pl => {
        if (player.vy > 0 && player.x+25 > pl.x && player.x < pl.x+pl.w && player.y+50 > pl.y && player.y+50 < pl.y+15) {
            if (!wasGrounded) { player.lastVy = player.vy; playFX(300 + (level * 20), 'sine', 0.1, 0.1); }
            player.vy = 0; player.y = pl.y - 50; player.grounded = true;
            if (!pl.passed) { pl.passed = true; blocks++; if (blocks >= 10) { level++; blocks = 0; playFX(900, 'sine', 0.2, 0.3); } updateUI(); }
        }
    });
    if (player.grounded) player.lastVy *= 0.8;
    for(let i=platforms.length-1; i>=0; i--) {
        if (platforms[i].y < -40) {
            platforms.splice(i, 1);
            platforms.push({ x: Math.random() * (canvas.width - 80), y: canvas.height + 50, w: 80, h: 20, passed: false, color: RAINBOW[Math.floor(Math.random() * RAINBOW.length)] });
        }
    }
    if (player.y < -60 || player.y > canvas.height + 60) { isGameOver = true; playFX(60, 'sawtooth', 0.3, 0.6); document.getElementById('overlay').style.display = 'flex'; return; }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    platforms.forEach(pl => draw3DPlatform(pl));
    drawStickman(player);
    animationId = requestAnimationFrame(gameLoop);
}

function updateUI() { document.getElementById('score-txt').innerText = `BLOCKS: ${blocks}/10`; document.getElementById('lvl-txt').innerText = `LVL: ${level}`; }
function resetGame() { document.getElementById('overlay').style.display = 'none'; init(); }
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
const setupBtn = (id, key) => {
    const b = document.getElementById(id);
    b.addEventListener('pointerdown', e => { e.preventDefault(); keys[key] = true; if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); });
    b.addEventListener('pointerup', e => { e.preventDefault(); keys[key] = false; });
    b.addEventListener('pointerleave', e => { keys[key] = false; });
};
setupBtn('btn-up', 'UpBtn'); setupBtn('btn-left', 'LeftBtn'); setupBtn('btn-right', 'RightBtn');
window.onload = init;
</script>
</body>
</html>
